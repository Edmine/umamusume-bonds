<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>特雷森学园：赛马娘羁绊档案馆</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <script src="data.js"></script>
    
    <style>
        body { margin: 0; background-color: #1a1a2e; color: white; font-family: sans-serif; }
        #main { width: 100vw; height: 100vh; overflow: hidden; }
        .title { position: absolute; top: 20px; left: 20px; z-index: 10; }
    </style>
</head>
<body>
    <div class="title">
        <h1>特雷森学园羁绊网络</h1>
    </div>
    <div id="main"></div>

    <script>
        var chartDom = document.getElementById('main');
        var myChart = echarts.init(chartDom);
        
        // --- 头像加载逻辑 ---
        // ⚠️ 确保你的 data.js 里面的全局变量名是 graphData，而不是 umaData！
        graphData.nodes.forEach(function(node) {
            // 直接读取同级目录 icons 文件夹下的图片
            node.symbol = 'image://icons/' + node.id + '.png';
            
            // 防错处理：确保有 symbolSize 才乘以 1.2
            if (node.symbolSize) {
                node.symbolSize = node.symbolSize * 1.2;
            } else {
                node.symbolSize = 50; // 默认大小
            }
            
            // 如果图片还没准备好，先显示一个深色背景兜底
            node.itemStyle = { color: '#3b3b5c' }; 
        });

        // 图表的华丽配置 (次世代UI升级版)
        var option = {
            backgroundColor: '#1a1a2e', // 统一暗黑背景
            tooltip: { 
                show: true, 
                backgroundColor: 'rgba(20, 20, 40, 0.9)', // 弹窗背景变高级的半透明深蓝
                borderColor: '#00ffff', // 弹窗边框加上青色赛博朋克感
                borderWidth: 1,
                textStyle: { color: '#fff', fontSize: 16 } // 弹窗文字纯白
            },
            legend: { 
                // ✅ 这里动态读取了 graphData 里的分类作为图例
                data: graphData.categories.map(function (a) { return a.name; }),
                type: 'scroll', 
                top: 'bottom', 
                textStyle: { color: '#fff' },
                pageIconColor: '#00ffff', // 图例翻页按钮的颜色
                pageTextStyle: { color: '#fff' }
            },
            series: [{
                type: 'graph',
                layout: 'force',
                // ✅ 这里调用抽离的数据
                data: graphData.nodes,
                links: graphData.links,
                categories: graphData.categories,
                
                roam: true, // 允许鼠标缩放和拖拽
                label: { 
                    show: true, 
                    position: 'bottom', 
                    color: '#fff', 
                    fontSize: 13,
                    textBorderColor: '#000', // 给名字加上黑边，防止看不清
                    textBorderWidth: 2
                },
                itemStyle: {
                    borderColor: '#fff', // 节点白边
                    borderWidth: 1.5,
                    shadowBlur: 15, // 发光特效
                    shadowColor: 'rgba(255, 255, 255, 0.4)'
                },
                edgeSymbol: ['none', 'arrow'], // 线条加上箭头
                edgeSymbolSize: [4, 8], // 稍微把箭头调精致一点
                edgeLabel: {
                    show: true,
                    formatter: function (params) { return params.data.value; },
                    color: 'rgba(255, 255, 255, 0.6)', // 平时的关系字变半透明
                    fontSize: 11
                },
                force: {
                    repulsion: 800, // 排斥力
                    edgeLength: [120, 250], // 连线的弹性长度范围
                    gravity: 0.1 // 向中心的引力，防止飞出屏幕
                },
                lineStyle: { 
                    color: 'source', 
                    curveness: 0.3, 
                    width: 1.5, 
                    opacity: 0.5 // 平时连线半透明，不刺眼
                },
                emphasis: { // 这里是核心：鼠标悬停的高级交互特效
                    focus: 'adjacency', // 聚焦相邻节点，无关节点自动虚化！
                    lineStyle: { 
                        width: 4, // 鼠标指上去线变粗
                        opacity: 1 
                    },
                    itemStyle: {
                        shadowBlur: 30, // 节点发光增强
                        shadowColor: '#00ffff'
                    },
                    edgeLabel: {
                        color: '#00ffff', // 悬停时关系文字高亮发光
                        fontSize: 14,
                        fontWeight: 'bold'
                    }
                }
            }]
        };

        myChart.setOption(option);
        
        // 顺手帮你加了一个防浏览器拉伸变形的监听
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
