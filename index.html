                        width: 4, // 鼠标指上去线变粗

                    itemStyle: {
                        shadowBlur: 30, // 节点发光增强
                        shadowColor: '#00ffff'
                    },
                    edgeLabel: {
                        color: '#00ffff', // 悬停时关系文字高亮发光
                        fontSize: 14,
                        fontWeight: 'bold'
                    }
                }
            }]
        };

        myChart.setOption(option);
